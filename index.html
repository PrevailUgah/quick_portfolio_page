<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beacon | Illuminating Hope</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;500;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'DM Sans', sans-serif;
            background-color: #FAFAF9;
            color: #1C1917;
            scroll-behavior: smooth;
        }
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Playfair Display', serif;
        }
        .glass-nav {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }
        .fade-in-up {
            animation: fadeInUp 0.8s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }
        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .clip-slant {
            clip-path: polygon(0 0, 100% 0, 100% 85%, 0 100%);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // --- Internal Icon Definitions ---
        // Replacing external library with inline components to prevent "forwardRef" errors
        const Icon = ({ size = 24, color = "currentColor", fill = "none", strokeWidth = 2, children, ...props }) => (
            <svg 
                xmlns="http://www.w3.org/2000/svg" 
                width={size} 
                height={size} 
                viewBox="0 0 24 24" 
                fill={fill} 
                stroke={color} 
                strokeWidth={strokeWidth} 
                strokeLinecap="round" 
                strokeLinejoin="round" 
                {...props}
            >
                {children}
            </svg>
        );

        const LucideIcons = {
            Heart: (props) => <Icon {...props}><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></Icon>,
            HandHeart: (props) => <Icon {...props}><path d="M11 14h2a2 2 0 1 0 0-4h-3c-.6 0-1.1.2-1.4.6L4.3 16.3a2 2 0 0 0 2 3.4l1.7-.3c.4-.1.7.1.9.4l1.1 2.2a2 2 0 0 0 3.8-1l-.4-2c-.1-.7.2-1.4.9-1.6l1.1-.3c1.6-.4 2.6-2 2.6-3.6V11"/><path d="M18 11a5 5 0 0 0-9.54 2.1"/></Icon>,
            Users: (props) => <Icon {...props}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></Icon>,
            ArrowRight: (props) => <Icon {...props}><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></Icon>,
            Globe: (props) => <Icon {...props}><circle cx="12" cy="12" r="10"/><line x1="2" x2="22" y1="12" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></Icon>,
            ShieldCheck: (props) => <Icon {...props}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/><path d="m9 12 2 2 4-4"/></Icon>,
            Mail: (props) => <Icon {...props}><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></Icon>,
            Menu: (props) => <Icon {...props}><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></Icon>,
            X: (props) => <Icon {...props}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></Icon>,
            Sprout: (props) => <Icon {...props}><path d="M7 20h10"/><path d="M10 20c5.5-2.5.8-6.4 3-10"/><path d="M9.5 9.4c1.1.8 1.8 2.2 2.3 3.7-2 .4-3.2.4-4.8-.3-1.2-.6-2.3-1.9-3-4.2 2.8-.5 4.4 0 5.5.8z"/><path d="M14.1 6a7 7 0 0 0-1.1 4c1.9-.1 3.3-.6 4.3-1.4 1-1 1.6-2.3 1.7-4.6-2.7.1-4 1-4.9 2z"/></Icon>,
            Layout: (props) => <Icon {...props}><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/></Icon>,
            Smartphone: (props) => <Icon {...props}><rect width="14" height="20" x="5" y="2" rx="2" ry="2"/><path d="M12 18h.01"/></Icon>,
        };

        const { 
            Heart, HandHeart, Users, ArrowRight, 
            Globe, ShieldCheck, Mail, Menu, X,
            Sprout, Layout, Smartphone
        } = LucideIcons;

        // --- Components ---

        const Navbar = ({ isMenuOpen, setIsMenuOpen }) => (
            <nav className="glass-nav fixed w-full top-0 z-50 transition-all duration-300">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                    <div className="flex justify-between items-center h-20">
                        {/* Logo */}
                        <div className="flex items-center gap-2 cursor-pointer">
                            <div className="w-10 h-10 bg-orange-500 rounded-full flex items-center justify-center text-white">
                                <Heart size={20} fill="currentColor" />
                            </div>
                            <span className="font-serif text-2xl font-bold tracking-tight text-gray-900">Beacon</span>
                        </div>

                        {/* Desktop Links */}
                        <div className="hidden md:flex items-center gap-8">
                            <a href="#mission" className="text-sm font-medium text-gray-600 hover:text-orange-500 transition">Our Mission</a>
                            <a href="#how-it-works" className="text-sm font-medium text-gray-600 hover:text-orange-500 transition">How it Works</a>
                            <a href="#impact" className="text-sm font-medium text-gray-600 hover:text-orange-500 transition">Impact</a>
                            <button className="bg-gray-900 text-white px-6 py-2.5 rounded-full text-sm font-medium hover:bg-orange-600 transition shadow-lg hover:shadow-xl">
                                Join the Waitlist
                            </button>
                        </div>

                        {/* Mobile Menu Button */}
                        <div className="md:hidden">
                            <button onClick={() => setIsMenuOpen(!isMenuOpen)} className="text-gray-600">
                                {isMenuOpen ? <X /> : <Menu />}
                            </button>
                        </div>
                    </div>
                </div>

                {/* Mobile Menu */}
                {isMenuOpen && (
                    <div className="md:hidden bg-white border-t border-gray-100 absolute w-full px-4 py-6 shadow-xl flex flex-col gap-4">
                        <a href="#mission" onClick={() => setIsMenuOpen(false)} className="text-lg font-medium text-gray-800">Our Mission</a>
                        <a href="#how-it-works" onClick={() => setIsMenuOpen(false)} className="text-lg font-medium text-gray-800">How it Works</a>
                        <a href="#impact" onClick={() => setIsMenuOpen(false)} className="text-lg font-medium text-gray-800">Impact</a>
                        <button className="bg-orange-500 text-white py-3 rounded-lg font-medium w-full mt-2">
                            Join the Waitlist
                        </button>
                    </div>
                )}
            </nav>
        );

        const Hero = () => (
            <section className="relative pt-32 pb-20 lg:pt-48 lg:pb-32 overflow-hidden">
                <div className="absolute top-0 right-0 -mr-20 -mt-20 w-[600px] h-[600px] bg-orange-100/50 rounded-full blur-3xl -z-10"></div>
                <div className="absolute bottom-0 left-0 -ml-20 -mb-20 w-[400px] h-[400px] bg-blue-100/50 rounded-full blur-3xl -z-10"></div>

                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col md:flex-row items-center gap-12">
                    <div className="md:w-1/2 fade-in-up">
                        <div className="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-orange-50 border border-orange-100 text-orange-600 text-xs font-bold tracking-wide uppercase mb-6">
                            <span className="w-2 h-2 rounded-full bg-orange-500 animate-pulse"></span>
                            Live Beta Now Open
                        </div>
                        <h1 className="text-5xl md:text-6xl lg:text-7xl font-bold leading-[1.1] text-gray-900 mb-6">
                            Direct aid,<br/>
                            <span className="text-orange-500">amplified.</span>
                        </h1>
                        <p className="text-xl text-gray-500 leading-relaxed mb-8 max-w-lg">
                            We bridge the gap between compassionate donors and verified local families in crisis. No middlemen, just impact.
                        </p>
                        <div className="flex flex-col sm:flex-row gap-4">
                            <button className="px-8 py-4 bg-gray-900 text-white rounded-full font-medium hover:bg-gray-800 transition flex items-center justify-center gap-2 group">
                                Start Helping
                                <ArrowRight size={18} className="group-hover:translate-x-1 transition" />
                            </button>
                            <button className="px-8 py-4 bg-white border border-gray-200 text-gray-700 rounded-full font-medium hover:bg-gray-50 transition">
                                Watch Video
                            </button>
                        </div>
                    </div>
                    <div className="md:w-1/2 relative fade-in-up" style={{ animationDelay: '0.2s' }}>
                        <div className="relative rounded-2xl overflow-hidden shadow-2xl aspect-[4/3] group">
                            <img 
                                src="https://images.unsplash.com/photo-1488521787991-ed7bbaae773c?q=80&w=1000&auto=format&fit=crop" 
                                alt="Volunteers helping" 
                                className="object-cover w-full h-full transform group-hover:scale-105 transition duration-700"
                                onError={(e) => {
                                    e.target.style.display = 'none'; 
                                    e.target.parentNode.style.backgroundColor = '#E5E7EB';
                                }}
                            />
                            <div className="absolute bottom-0 left-0 w-full p-6 bg-gradient-to-t from-black/70 to-transparent">
                                <p className="text-white font-medium">Community Food Drive, Lagos</p>
                            </div>
                        </div>
                        
                        {/* Floating Card */}
                        <div className="absolute -bottom-6 -left-6 bg-white p-4 rounded-xl shadow-xl border border-gray-100 max-w-xs animate-bounce" style={{ animationDuration: '3s' }}>
                            <div className="flex items-center gap-3">
                                <div className="bg-green-100 p-2 rounded-full text-green-600">
                                    <ShieldCheck size={20} />
                                </div>
                                <div>
                                    <p className="text-xs text-gray-500 uppercase font-bold">Trust Score</p>
                                    <p className="text-sm font-bold text-gray-900">100% Verified Needs</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        );

        const Mission = () => (
            <section id="mission" className="py-24 bg-white">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                    <div className="text-center max-w-3xl mx-auto mb-16">
                        <h2 className="text-3xl md:text-4xl font-bold mb-4">Why we built Beacon</h2>
                        <p className="text-gray-500 text-lg">
                            Traditional charity is often slow and opaque. We use technology to create immediate, transparent connections between abundance and scarcity.
                        </p>
                    </div>

                    <div className="grid md:grid-cols-3 gap-8">
                        {[
                            {
                                icon: HandHeart,
                                title: "Peer-to-Peer Giving",
                                desc: "Connect directly with families in your area. Read their stories, understand their needs, and make a direct impact.",
                                color: "bg-orange-100 text-orange-600"
                            },
                            {
                                icon: Globe,
                                title: "Transparency First",
                                desc: "Track every dollar. See exactly when your donation is received and how it is utilized by the recipient.",
                                color: "bg-blue-100 text-blue-600"
                            },
                            {
                                icon: Sprout,
                                title: "Sustainable Growth",
                                desc: "We don't just give aid; we partner with local NGOs to provide skills training for long-term independence.",
                                color: "bg-green-100 text-green-600"
                            }
                        ].map((item, idx) => (
                            <div key={idx} className="p-8 rounded-2xl bg-gray-50 hover:bg-white border border-transparent hover:border-gray-200 hover:shadow-lg transition duration-300 group">
                                <div className={`w-14 h-14 rounded-2xl ${item.color} flex items-center justify-center mb-6 group-hover:scale-110 transition`}>
                                    <item.icon size={28} />
                                </div>
                                <h3 className="text-xl font-bold mb-3 text-gray-900">{item.title}</h3>
                                <p className="text-gray-500 leading-relaxed">
                                    {item.desc}
                                </p>
                            </div>
                        ))}
                    </div>
                </div>
            </section>
        );

        const HowItWorks = () => (
            <section id="how-it-works" className="py-24 bg-gray-900 text-white clip-slant pb-40">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                    <div className="flex flex-col md:flex-row justify-between items-end mb-16 gap-6">
                        <div>
                            <span className="text-orange-500 font-bold tracking-widest uppercase text-sm mb-2 block">The Process</span>
                            <h2 className="text-4xl font-bold">Simple steps to big change</h2>
                        </div>
                        <button className="text-gray-300 hover:text-white flex items-center gap-2 transition">
                            Read Documentation <ArrowRight size={16} />
                        </button>
                    </div>

                    <div className="grid md:grid-cols-3 gap-12 relative">
                        {/* Connector Line (Desktop) */}
                        <div className="hidden md:block absolute top-12 left-0 w-full h-0.5 bg-gray-700 -z-0"></div>

                        {[
                            { step: "01", title: "Verify", desc: "Local NGOs verify families and post specific, urgent needs." },
                            { step: "02", title: "Match", desc: "Our algorithm matches donors to needs based on location and capability." },
                            { step: "03", title: "Deliver", desc: "Logistics partners ensure aid reaches the doorstep within 24 hours." }
                        ].map((step, idx) => (
                            <div key={idx} className="relative z-10 bg-gray-900">
                                <div className="w-24 h-24 bg-gray-800 rounded-full flex items-center justify-center border-4 border-gray-900 text-3xl font-serif font-bold text-orange-500 mb-6">
                                    {step.step}
                                </div>
                                <h3 className="text-2xl font-bold mb-2">{step.title}</h3>
                                <p className="text-gray-400">{step.desc}</p>
                            </div>
                        ))}
                    </div>
                </div>
            </section>
        );

        const Stats = () => (
            <section id="impact" className="py-20 -mt-24 relative z-20">
                <div className="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
                    <div className="bg-white rounded-3xl shadow-2xl p-12 grid grid-cols-2 md:grid-cols-4 gap-8 text-center divide-x divide-gray-100">
                        {[
                            { num: "50K+", label: "Meals Served" },
                            { num: "1,200", label: "Families Aided" },
                            { num: "$450K", label: "Raised Directly" },
                            { num: "100%", label: "Transparency" }
                        ].map((stat, idx) => (
                            <div key={idx} className="p-2">
                                <div className="text-4xl lg:text-5xl font-bold text-gray-900 mb-2">{stat.num}</div>
                                <div className="text-sm font-bold uppercase tracking-wider text-gray-500">{stat.label}</div>
                            </div>
                        ))}
                    </div>
                </div>
            </section>
        );

        const Footer = () => (
            <footer className="bg-white border-t border-gray-200 pt-20 pb-10">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                    <div className="grid md:grid-cols-4 gap-12 mb-16">
                        <div className="col-span-1 md:col-span-2">
                            <div className="flex items-center gap-2 mb-6">
                                <div className="w-8 h-8 bg-orange-500 rounded-full flex items-center justify-center text-white">
                                    <Heart size={16} fill="currentColor" />
                                </div>
                                <span className="font-serif text-xl font-bold text-gray-900">Beacon</span>
                            </div>
                            <p className="text-gray-500 max-w-sm mb-6">
                                Technology for the greater good. We are a non-profit tech startup dedicated to solving hunger and resource inequality.
                            </p>
                            <div className="flex gap-4">
                                {/* Social placeholders */}
                                <div className="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center text-gray-600 hover:bg-orange-100 hover:text-orange-600 transition cursor-pointer">
                                    <span className="font-bold">X</span>
                                </div>
                                <div className="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center text-gray-600 hover:bg-orange-100 hover:text-orange-600 transition cursor-pointer">
                                    <span className="font-bold">In</span>
                                </div>
                            </div>
                        </div>
                        
                        <div>
                            <h4 className="font-bold text-gray-900 mb-4">Platform</h4>
                            <ul className="space-y-3 text-sm text-gray-500">
                                <li><a href="#" className="hover:text-orange-500">Find Help</a></li>
                                <li><a href="#" className="hover:text-orange-500">Donate Goods</a></li>
                                <li><a href="#" className="hover:text-orange-500">Volunteer</a></li>
                                <li><a href="#" className="hover:text-orange-500">Partner NGOs</a></li>
                            </ul>
                        </div>

                        <div>
                            <h4 className="font-bold text-gray-900 mb-4">Contact</h4>
                            <ul className="space-y-3 text-sm text-gray-500">
                                <li className="flex items-center gap-2"><Mail size={16}/> prevailbugah@gmailcom</li>
                                <li>S+234 811 665 9910</li>
                                <li>Kaduna, Nigeria</li>
                            </ul>
                        </div>
                    </div>
                    
                    <div className="border-t border-gray-100 pt-8 flex flex-col md:flex-row justify-between items-center text-sm text-gray-400">
                        <p>&copy; 2025 Beacon Initiative. All rights reserved.</p>
                        <div className="flex gap-6 mt-4 md:mt-0">
                            <a href="#" className="hover:text-gray-900">Privacy Policy</a>
                            <a href="#" className="hover:text-gray-900">Terms of Service</a>
                        </div>
                    </div>
                </div>
            </footer>
        );

        const App = () => {
            const [isMenuOpen, setIsMenuOpen] = useState(false);

            return (
                <div className="min-h-screen flex flex-col">
                    <Navbar isMenuOpen={isMenuOpen} setIsMenuOpen={setIsMenuOpen} />
                    <main className="flex-grow">
                        <Hero />
                        <Mission />
                        <HowItWorks />
                        <Stats />
                        
                        {/* Call to Action */}
                        <section className="py-24 px-4 text-center">
                            <div className="max-w-4xl mx-auto bg-orange-50 rounded-3xl p-12 border border-orange-100">
                                <h2 className="text-3xl md:text-4xl font-bold mb-4 font-serif text-gray-900">Ready to make a difference?</h2>
                                <p className="text-gray-600 mb-8 max-w-xl mx-auto">
                                    Join thousands of donors and volunteers changing lives today. Download the app to get started.
                                </p>
                                <div className="flex flex-col sm:flex-row justify-center gap-4">
                                    <button className="px-6 py-3 bg-gray-900 text-white rounded-xl font-medium flex items-center justify-center gap-2 hover:bg-gray-800 transition">
                                        <Smartphone size={20} /> Download for iOS
                                    </button>
                                    <button className="px-6 py-3 bg-white border border-gray-200 text-gray-900 rounded-xl font-medium flex items-center justify-center gap-2 hover:bg-gray-50 transition">
                                        <Layout size={20} /> Use Web Portal
                                    </button>
                                </div>
                            </div>
                        </section>
                    </main>
                    <Footer />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
